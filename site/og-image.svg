<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c14"/>
      <stop offset="1" stop-color="#08090d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#8b86ff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#8b86ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#5cd9c7" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#5cd9c7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b86ff"/>
      <stop offset="1" stop-color="#5cd9c7"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a99bff"/>
      <stop offset="1" stop-color="#54d8cf"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- brand -->
  <g transform="translate(90,90)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#mark)"/>
    <circle cx="32" cy="32" r="17" fill="none" stroke="#08090d" stroke-width="4.4" stroke-opacity="0.92"/>
    <path d="M24 32.8 l5.8 5.8 L42 24" fill="none" stroke="#08090d" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="44" fill="#e8eaf4" font-size="34" font-weight="700" letter-spacing="-0.5">Juno Protocol</text>
  </g>

  <!-- headline -->
  <text x="90" y="270" fill="#e8eaf4" font-size="74" font-weight="800" letter-spacing="-2">Is it real, <tspan fill="url(#grad)">or AI?</tspan></text>
  <text x="90" y="340" fill="#aab0c6" font-size="33" font-weight="400">A neutral, economically-liable <tspan fill="#e8eaf4" font-weight="600">registry of record</tspan> for</text>
  <text x="90" y="384" fill="#aab0c6" font-size="33" font-weight="400">AI-content provenance — so no single company owns the answer.</text>

  <!-- proof chips -->
  <g transform="translate(90,452)" font-size="20" font-weight="600">
    <g>
      <rect x="0" y="0" width="250" height="44" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="29" fill="#cdd2e6">Vendor-neutral · open source</text>
    </g>
    <g transform="translate(266,0)">
      <rect x="0" y="0" width="232" height="44" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="29" fill="#cdd2e6">Reads free · claim of record</text>
    </g>
    <g transform="translate(514,0)">
      <rect x="0" y="0" width="244" height="44" rx="22" fill="#f5b34a" fill-opacity="0.10" stroke="#f5b34a" stroke-opacity="0.32"/>
      <text x="24" y="29" fill="#f5b34a">Pre-alpha · leads with its risks</text>
    </g>
  </g>

  <text x="90" y="582" fill="#6b7088" font-size="20">github.com/starcomp/junoprotocol</text>
</svg>
