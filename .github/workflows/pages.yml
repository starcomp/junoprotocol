name: Deploy landing page (GitHub Pages)

# Deploys the static landing page in site/ to GitHub Pages.
# ONE-TIME SETUP: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".
# NOTE: Pages on a PRIVATE repo requires a paid GitHub plan, and the published site is
# public regardless. See site/README.md for the visibility caveat and alternatives.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
