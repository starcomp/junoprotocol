# Foundry config for the Juno economic contracts.
# NOTE: these contracts were authored without a local Foundry toolchain; compile
# and test them with `forge build` / `forge test` (CI does this on every PR).
# First run `forge install foundry-rs/forge-std` to populate lib/.

[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = ["forge-std/=lib/forge-std/src/"]

[profile.ci]
verbosity = 3
fuzz = { runs = 512 }
invariant = { runs = 256, depth = 32, fail_on_revert = false }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
